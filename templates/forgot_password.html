{% extends "layout.html" %}
{% block content %}
    <div class="content-section py-3 px-4 mb-4">
        <h2 class="mb-4">Forgot Password</h2>
        <p class="text-body-secondary mb-4">Enter your email address and we'll send you a link to reset your password.</p>
        <form id="forgotPasswordForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       required
                       autofocus>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Send Reset Link</button>
        </form>
        <p class="mt-3">
            Remember your password? <a href="{{ url_for("login_page") }}">Login here</a>
        </p>
    </div>
{% endblock content %}
{% block scripts %}
    <script type="module" src="/static/js/forgot_password.js"></script>
{% endblock scripts %}
