<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>
            {% if title %}
                FastAPI Blog - {{ title }}
            {% else %}
                FastAPI Blog
            {% endif %}
        </title>
        
        <!-- Bootstrap Dark Mode script -->
        <script src="{{ url_for('static', path='js/theme.js') }}"></script>
        
        <!-- Bootstrap CSS stylesheet -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        
        <!-- Local CSS stylesheet -->
        <link rel="stylesheet" href="/static/css/style.css">

        <!-- Bootstrap Icons stylesheet -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        
        <!-- Theme color matching website's primary color -->
        <meta name="theme-color" content="#527c9f">

    </head>
    <body class="d-flex flex-column min-vh-100">

        <header class="site-header">

            <!-- NAVBAR -->
            <nav class="navbar navbar-expand-lg bg-body-tertiary">

                <!-- MATCHED CONTAINER -->
                <div class="container">
                    <a class="navbar-brand" href="{{ url_for("home") }}">FastAPI Blog</a>

                    <!-- NAVBAR TOGGLER -->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <!-- COLLAPSIBLE SECTION -->
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">

                        <!-- LEFT: Nav Links -->
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="{{ url_for("home") }}">Home</a>
                            </li>
                        </ul>

                        <!-- CENTER: Search Form -->
                        <div class="mx-auto">
                            <form class="d-flex" role="search">
                                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                                <button class="btn btn-outline-success" type="submit">Search</button>
                            </form>
                        </div>

                        <!-- RIGHT: Theme + Login/Register -->
                        <div class="d-flex gap-2 align-items-center">
                            <div class="dropdown">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" id="bd-theme">
                                    <span id="bd-theme-text"></span>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li><button class="dropdown-item" data-bs-theme-value="light"><i class="bi bi-sun-fill"></i> Light</button></li>
                                    <li><button class="dropdown-item" data-bs-theme-value="dark"><i class="bi bi-moon-stars-fill"></i> Dark</button></li>
                                    <li><button class="dropdown-item" data-bs-theme-value="auto"><i class="bi bi-sun-fill"></i> / <i class="bi bi-moon-stars-fill"></i> Auto</button></li>
                                </ul>
                            </div>
                            <a href="#" class="btn btn-outline-secondary btn-sm">Login</a>
                            <a href="#" class="btn btn-primary btn-sm">Register</a>
                        </div>

                    </div>
                </div>
            </nav>
        </header>

        <!-- MAIN LAYOUT -->
        <main class="container my-2 flex-grow-1">
            <div class="row">

                <!-- LEFT: MAIN CONTENT -->
                <div class="col-9">
                    {% block content %}
                    {% endblock content %}
                </div>

                <!-- RIGHT: SIDEBAR -->
                <aside class="col-3">

                    <div class="content-section py-3 px-4 mb-4">
                        <h3>Menu</h3>
                        <p class="text-body-secondary">Check also:</p>
                        <ul class="list-group">
                            <li class="list-group-item">Latest Posts</li>
                            <li class="list-group-item">Announcements</li>
                            <li class="list-group-item">Calendars</li>
                        </ul>
                    </div>
                </aside>

            </div>
        </main>

        <!-- FOOTER -->
        <footer class="bg-body-tertiary border-top mt-auto">
            <div class="container py-3 text-center">
                <small class="text-body-secondary">© 2026 FastAPI Blog</small>
            </div>
        </footer>

        <!-- Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    </body>
</html>
