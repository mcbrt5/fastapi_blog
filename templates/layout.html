<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>
            {% if title %}
                FastAPI Blog - {{ title }}
            {% else %}
                FastAPI Blog
            {% endif %}
        </title>
        
        <!-- Bootstrap Dark Mode script (should be in header) -->
        <script src="{{ url_for('static', path='js/theme.js') }}"></script>
        
        <!-- Bootstrap CSS stylesheet -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        
        <!-- Local CSS stylesheet -->
        <link rel="stylesheet" href="/static/css/style.css">

        <!-- Bootstrap Icons stylesheet -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        
        <!-- Theme color matching website's primary color -->
        <meta name="theme-color" content="#527c9f">

    </head>
    <body class="d-flex flex-column min-vh-100">

        <header class="site-header">

            <!-- NAVBAR -->
            <nav class="navbar navbar-expand-lg bg-body-tertiary">

                <!-- MATCHED CONTAINER -->
                <div class="container">
                    <a class="navbar-brand" href="{{ url_for("home") }}">FastAPI Blog</a>

                    <!-- NAVBAR TOGGLER -->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <!-- COLLAPSIBLE SECTION -->
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">

                        <!-- LEFT: Nav Links -->
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="{{ url_for("home") }}">Home</a>
                            </li>
                        </ul>

                        <!-- CENTER: Search Form -->
                        <div class="mx-auto">
                            <form class="d-flex" role="search" action="/search" method="get">
                                <input class="form-control me-2" type="search" name="q" placeholder="Search" aria-label="Search"/>
                                <button class="btn btn-outline-primary" type="submit">Search</button>
                            </form>
                        </div>

                        <!-- RIGHT: Theme + Login/Register -->
                        <div class="d-flex gap-2 align-items-center">
                            <div class="dropdown">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" id="bd-theme">
                                    <span id="bd-theme-text"></span>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li><button class="dropdown-item" data-bs-theme-value="light"><i class="bi bi-sun-fill"></i> Light</button></li>
                                    <li><button class="dropdown-item" data-bs-theme-value="dark"><i class="bi bi-moon-stars-fill"></i> Dark</button></li>
                                    <li><button class="dropdown-item" data-bs-theme-value="auto"><i class="bi bi-sun-fill"></i> / <i class="bi bi-moon-stars-fill"></i> Auto</button></li>
                                </ul>
                            </div>
                            <!-- Shown when logged in (hidden by default, shown via JS) -->
                            <div id="loggedInNav" class="d-none">
                                <button class="btn btn-outline-light mb-2 mb-md-0 me-md-2"
                                        type="button"
                                        data-bs-toggle="modal"
                                        data-bs-target="#createPostModal">New Post</button>
                                <a class="btn btn-light mb-2 mb-md-0 me-md-3"
                                href="{{ url_for("account_page") }}"
                                id="accountBtn">Account</a>
                            </div>
                            <!-- Shown when logged out -->
                            <div id="loggedOutNav">
                                <a class="btn btn-outline-light mb-2 mb-md-0 me-md-2"
                                   href="{{ url_for("login_page") }}">Login</a>
                                <a class="btn btn-light mb-2 mb-md-0 me-md-3"
                                   href="{{ url_for("register_page") }}">Register</a>
                            </div>
                        </div>

                    </div>
                </div>
            </nav>
        </header>

        <!-- MAIN LAYOUT -->
        <main class="container my-2 flex-grow-1">
            <div class="row">

                <!-- LEFT: MAIN CONTENT -->
                <div class="col-md-8">
                    {% block content %}
                    {% endblock content %}
                </div>

                <!-- RIGHT: SIDEBAR -->
                <aside class="col-3">

                    <!-- Menu -->
                    <div class="content-section py-3 px-4 mb-4">
                        <h3>Menu</h3>
                        <p class="text-body-secondary">Check also:</p>
                        <ul class="list-group">
                            <li class="list-group-item">Latest Posts</li>
                            <li class="list-group-item">Announcements</li>
                            <li class="list-group-item">Calendars</li>
                        </ul>
                    </div>

                    <!-- All Users -->
                    <div class="content-section py-3 px-4 mb-4">
                        <h3>Users</h3>
                        <ul class="list-group" id="usersList">
                            <li class="list-group-item text-body-secondary">Loading...</li>
                        </ul>
                    </div>

                </aside>

            </div>
        </main>

        <!-- FOOTER -->
        <footer class="bg-body-tertiary border-top mt-auto">
            <div class="container py-3 text-center">
                <small class="text-body-secondary">© 2026 FastAPI Blog</small>
            </div>
        </footer>

         <!-- Create Post Modal -->
        <div class="modal fade"
             id="createPostModal"
             tabindex="-1"
             aria-labelledby="createPostModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="createPostModalLabel">New Post</h5>
                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <form id="createPostForm">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>
                            <div class="mb-3">
                                <label for="content" class="form-label">Content</label>
                                <textarea class="form-control" id="content" name="content" rows="5" required></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button"
                                    class="btn btn-outline-secondary"
                                    data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Post</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Success Modal -->
        <div class="modal fade"
             id="successModal"
             tabindex="-1"
             aria-labelledby="successModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title" id="successModalLabel">Success</h5>
                        <button type="button"
                                class="btn-close btn-close-white"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="successMessage" class="fs-5"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Error Modal -->
        <div class="modal fade"
             id="errorModal"
             tabindex="-1"
             aria-labelledby="errorModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title" id="errorModalLabel">Error</h5>
                        <button type="button"
                                class="btn-close btn-close-white"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="errorMessage" class="fs-5"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
            <!-- Bootstrap Bundle with Popper -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
            <!-- Auth State Management-->
            <script type="module" src="/static/js/auth_state.js"></script>

            <!-- Create Post Form Handler (Frontend Create Post) -->
            <script type="module" src="/static/js/create_post.js"></script>

            <!-- Sidebar User Listing -->
            <script type="module" src="/static/js/sidebar.js"></script>
            {% block scripts %}
            {% endblock scripts %}
    </body>
</html>
